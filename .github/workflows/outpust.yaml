name: Checking Outputs
on: workflow_dispatch
jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      version:  ${{ steps.abc.outputs.version }}
    
    steps:
      - name: step one
        id: abc
        run: echo "version=1.0.1" >> $GITHUB_OUTPUT
      - name: step two
        run: echo "This is from step one ${{ steps.abc.outputs.version  }}"

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: job2
        run: echo "need output from ${{ needs.job1.outputs.version }} "
